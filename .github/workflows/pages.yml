name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Prepare site
        run: |
          mkdir -p dist
          curl -L "https://qfgwvqbasqkwyqagspvc.supabase.co/storage/v1/object/public/momentos/site-assets/v20260707/mariepe-pages-source.zip" -o site.zip
          unzip -q site.zip -d dist
          python3 <<'PY'
          from pathlib import Path
          import re

          dist = Path("dist")
          title_tag = "<title>Casamento Mari e Pe | 2027</title>"
          favicon_links = "\n".join([
              "  <link rel=\"icon\" type=\"image/svg+xml\" href=\"favicon.svg\" />",
              "  <link rel=\"shortcut icon\" href=\"favicon.svg\" />",
          ])
          favicon_svg = "\n".join([
              "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 64 64\">",
              "  <rect width=\"64\" height=\"64\" rx=\"14\" fill=\"#f5f1e8\"/>",
              "  <circle cx=\"32\" cy=\"32\" r=\"23\" fill=\"none\" stroke=\"#a08858\" stroke-width=\"3\"/>",
              "  <text x=\"32\" y=\"39\" text-anchor=\"middle\" font-family=\"Georgia, serif\" font-size=\"23\" font-style=\"italic\" fill=\"#2a3320\">MP</text>",
              "</svg>",
          ]) + "\n"

          (dist / "favicon.svg").write_text(favicon_svg, encoding="utf-8")

          for page_name in ["index.html", "momentos.html", "admin.html"]:
              page = dist / page_name
              html = page.read_text(encoding="utf-8")
              html = re.sub(r"<title>.*?</title>", title_tag, html, count=1, flags=re.S)
              if "favicon.svg" not in html:
                  html = html.replace(title_tag, title_tag + "\n" + favicon_links, 1)
              page.write_text(html, encoding="utf-8")

          momentos = dist / "momentos.html"
          html = momentos.read_text(encoding="utf-8")
          html = html.replace("10 perguntas rápidas. No final você descobre se é quase da família!", "12 perguntas rápidas. No final você descobre se é quase da família!")
          html = html.replace("Pergunta 1 de 10", "Pergunta 1 de 12")
          html = html.replace("<span>/10</span>", "<span>/12</span>")
          quiz_block = """const QUIZ_PERGUNTAS = [
            { pergunta: 'Onde foi o primeiro encontro da Mari e do Pedro?',
              opcoes: ['Num aniversário em São Paulo', 'Numa praia em Maceió', 'Num voo BSB → GRU', 'Num aplicativo de namoro'],
              correta: 0 },
            { pergunta: 'Quem falou "eu te amo" primeiro?',
              opcoes: ['A Mari', 'O Pedro', 'Falaram juntos', 'Ninguém admite'],
              correta: 1 },
            { pergunta: 'Quem demora mais para se arrumar?',
              opcoes: ['A Mari', 'O Pedro', 'Empate técnico', 'Depende da ocasião'],
              correta: 0 },
            { pergunta: 'Qual foi o maior desafio do namoro à distância?',
              opcoes: ['Saudade', 'Preço da passagem', 'Agenda dos dois', 'Todas as anteriores'],
              correta: 3 },
            { pergunta: 'Quem chega em cima da hora no aeroporto pra viagem?',
              opcoes: ['A Mari', 'O Pedro', 'Os dois', 'Ninguém, chegam cedo demais'],
              correta: 2 },
            { pergunta: 'Qual rota aérea marcou o namoro dos dois?',
              opcoes: ['CGH ↔ BSB', 'GRU ↔ MCZ', 'CGH ↔ SDU', 'BSB ↔ REC'],
              correta: 0 },
            { pergunta: 'Quem tira mais e reclama das fotos?',
              opcoes: ['A Mari', 'O Pedro', 'Os dois', 'Ninguém, só vivem o momento'],
              correta: 0 },
            { pergunta: 'Quem cozinha melhor?',
              opcoes: ['A Mari', 'O Pedro', 'iFood', 'Os dois arrasam'],
              correta: 2 },
            { pergunta: 'Quem é mais organizado?',
              opcoes: ['A Mari', 'O Pedro', 'Nenhum dos dois', 'Os dois são neuróticos por organização'],
              correta: 2 },
            { pergunta: 'Onde foi o pedido de casamento?',
              opcoes: ['Na praia', 'Em casa, num jantar surpresa', 'Numa viagem', 'No lugar onde se conheceram'],
              correta: 2 },
            { pergunta: 'Quem escolheu Porto de Pedras para o casamento?',
              opcoes: ['A Mari', 'O Pedro', 'Foi decisão dos dois', 'A cerimonialista'],
              correta: 1 },
            { pergunta: 'Quem vai dominar a pista de dança?',
              opcoes: ['A Mari', 'O Pedro', 'Os padrinhos', 'Todo mundo depois do open bar'],
              correta: 3 }
          ];"""
          html = re.sub(r"const QUIZ_PERGUNTAS = \[.*?\];", quiz_block, html, count=1, flags=re.S)
          momentos.write_text(html, encoding="utf-8")

          index = dist / "index.html"
          html = index.read_text(encoding="utf-8")

          mobile_css = "\n".join([
              "<style id=\"mp-mobile-menu-fix\">",
              "  .nav-links { margin: 0; padding: 0; }",
              "  .nav-toggle { border: 0; background: transparent; padding: .6rem; margin: -.6rem; }",
              "  .nav-toggle span { width: 24px; background: rgba(255,255,255,.86); transition: transform .25s, opacity .25s, background .25s; }",
              "  nav.scrolled .nav-toggle span, nav.nav-open .nav-toggle span { background: var(--ink); }",
              "  @media (max-width: 700px) {",
              "    body.nav-open-body { overflow: hidden; }",
              "    nav { z-index: 300; }",
              "    nav.nav-open { background: rgba(245,241,232,.98); box-shadow: 0 1px 20px rgba(42,51,32,.10); }",
              "    nav.nav-open .nav-logo img { filter: none; opacity: 1; }",
              "    .nav-logo, .nav-toggle { position: relative; z-index: 2; }",
              "    .nav-links { position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: .75rem; overflow-y: auto; padding: 6.4rem 1.4rem 2rem; background: rgba(245,241,232,.98); opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(-10px); transition: opacity .25s, transform .25s, visibility .25s; }",
              "    .nav-links.open { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0); }",
              "    .nav-links li { width: min(100%, 330px); }",
              "    .nav-links a { display: block; width: 100%; padding: .78rem .9rem; border: 1px solid rgba(160,136,88,.20); background: rgba(255,255,255,.46); color: var(--ink); text-align: center; font-size: .78rem; }",
              "    .nav-links a:hover { color: var(--ink); }",
              "    nav.nav-open .nav-toggle span:nth-child(1) { transform: translateY(6px) rotate(45deg); }",
              "    nav.nav-open .nav-toggle span:nth-child(2) { opacity: 0; }",
              "    nav.nav-open .nav-toggle span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }",
              "  }",
              "</style>",
          ]) + "\n"

          mobile_js = "\n".join([
              "<script id=\"mp-mobile-menu-fix-js\">",
              "  (function () {",
              "    const nav = document.getElementById('nav');",
              "    const links = document.getElementById('navLinks');",
              "    const toggle = document.querySelector('.nav-toggle');",
              "    if (!nav || !links || !toggle) return;",
              "    toggle.setAttribute('type', 'button');",
              "    toggle.setAttribute('aria-controls', 'navLinks');",
              "    toggle.setAttribute('aria-expanded', 'false');",
              "    toggle.setAttribute('aria-label', 'Abrir menu');",
              "    window.toggleNav = function () {",
              "      const aberto = links.classList.toggle('open');",
              "      nav.classList.toggle('nav-open', aberto);",
              "      document.body.classList.toggle('nav-open-body', aberto);",
              "      toggle.setAttribute('aria-expanded', aberto ? 'true' : 'false');",
              "      toggle.setAttribute('aria-label', aberto ? 'Fechar menu' : 'Abrir menu');",
              "    };",
              "    window.closeNav = function () {",
              "      links.classList.remove('open');",
              "      nav.classList.remove('nav-open');",
              "      document.body.classList.remove('nav-open-body');",
              "      toggle.setAttribute('aria-expanded', 'false');",
              "      toggle.setAttribute('aria-label', 'Abrir menu');",
              "    };",
              "    window.addEventListener('resize', () => { if (window.innerWidth > 700) window.closeNav(); });",
              "    window.addEventListener('keydown', event => { if (event.key === 'Escape') window.closeNav(); });",
              "  })();",
              "</script>",
          ]) + "\n"

          if "mp-mobile-menu-fix" not in html:
              html = html.replace("</head>", mobile_css + "</head>", 1)
          if "mp-mobile-menu-fix-js" not in html:
              html = html.replace("</body>", mobile_js + "</body>", 1)
          html = html.replace(
              '<a href="momentos.html" style="color:var(--gold-lt)">✨ Momentos</a>',
              '<a href="momentos.html" style="color:var(--gold-lt)" onclick="closeNav()">✨ Momentos</a>',
          )
          index.write_text(html, encoding="utf-8")
          PY
          test -f dist/index.html
          test -f dist/favicon.svg

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
